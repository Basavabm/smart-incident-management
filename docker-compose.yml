services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: sim-backend:local
    container_name: sim-backend
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://host.docker.internal:5432/sim
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 3600000
      GMAIL_USERNAME: ${GMAIL_USERNAME}
      GMAIL_PASSWORD: ${GMAIL_PASSWORD}
      PORT: 8081
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://35.200.195.146:8081
    image: sim-frontend:local
    container_name: sim-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
