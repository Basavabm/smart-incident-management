apiVersion: apps/v1
kind: Deployment
metadata:
  name: sim-frontend
  namespace: smartims
  labels:
    app: sim-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sim-frontend
  template:
    metadata:
      labels:
        app: sim-frontend
    spec:
      containers:
        - name: sim-frontend
          image: basavabm/sim-frontend:v4
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sim-frontend-service
  namespace: smartims
spec:
  type: NodePort
  selector:
    app: sim-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30173
