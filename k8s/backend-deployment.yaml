apiVersion: apps/v1
kind: Deployment
metadata:
  name: sim-backend
  namespace: smartims
  labels:
    app: sim-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sim-backend
  template:
    metadata:
      labels:
        app: sim-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8081"
    spec:
      containers:
        - name: sim-backend
          image: basavabm/sim-backend:v4
          ports:
            - containerPort: 8081
          env:
            - name: DB_URL
              value: "jdbc:postgresql://sim-postgres:5432/sim"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef: { name: smartims-secrets, key: DB_USERNAME }
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef: { name: smartims-secrets, key: DB_PASSWORD }
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef: { name: smartims-secrets, key: JWT_SECRET }
            - name: GMAIL_USERNAME
              valueFrom:
                secretKeyRef: { name: smartims-secrets, key: GMAIL_USERNAME }
            - name: GMAIL_PASSWORD
              valueFrom:
                secretKeyRef: { name: smartims-secrets, key: GMAIL_PASSWORD }
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sim-backend-service
  namespace: smartims
spec:
  type: NodePort
  selector:
    app: sim-backend
  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30081
