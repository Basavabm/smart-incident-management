apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sim-postgres-pvc
  namespace: smartims
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sim-postgres
  namespace: smartims
spec:
  replicas: 1
  selector:
    matchLabels: { app: sim-postgres }
  template:
    metadata:
      labels: { app: sim-postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: sim
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef: { name: smartims-secrets, key: DB_USERNAME }
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: smartims-secrets, key: DB_PASSWORD }
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "postgres"] }
            initialDelaySeconds: 10
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: sim-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: sim-postgres
  namespace: smartims
spec:
  selector: { app: sim-postgres }
  ports:
    - port: 5432
      targetPort: 5432
